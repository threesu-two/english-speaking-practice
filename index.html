<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>英语口语练习</title>
<style>
:root{
  --bg:#f5f0eb;--card:#fff;--text:#2c2c2c;--sub:#888;
  --pri:#4a90d9;--pri2:#357abd;--border:#e0d8cf;
  --shadow:0 1px 4px rgba(0,0,0,.06);
  --active:#d4edda;--active2:#28a745;--tag-bg:#f0e9e0;
  --danger:#e74c3c;
}
[data-theme="dark"]{
  --bg:#1a1a2e;--card:#252540;--text:#e0e0e0;--sub:#aaa;
  --pri:#6db3f2;--pri2:#4a9de0;--border:#3a3a55;
  --shadow:0 1px 4px rgba(0,0,0,.3);
  --active:#1e3a2f;--active2:#28a745;--tag-bg:#3a3a50;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  line-height:1.6;transition:background .3s,color .3s;
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:720px;margin:0 auto;padding:12px 12px 80px}

/* Header */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border-radius:14px;padding:14px 18px;
  margin-bottom:10px;box-shadow:var(--shadow);gap:10px;
}
.topbar h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar h1 span{font-size:24px}
.topbar .meta{font-size:12px;color:var(--sub)}
.theme-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);font-size:18px;cursor:pointer;flex-shrink:0;
}

/* Controls Row */
.ctrl{
  background:var(--card);border-radius:14px;padding:10px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);
}
.ctrl-btns{
  display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;
}
.ctrl-btns button{flex:1;min-width:60px}
.ctrl-opts{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;
}

/* Buttons */
.btn{
  padding:10px 14px;border-radius:10px;border:none;font-size:14px;
  font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;
  white-space:nowrap;
}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:active{background:var(--pri2);transform:scale(.97)}
.btn-out{
  background:transparent;border:1.5px solid var(--border);color:var(--text);
}
.btn-out:active{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.4;pointer-events:none}

/* Select / Slider */
select{
  padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:13px;
  font-family:inherit;max-width:150px;
}
input[type=range]{width:80px;accent-color:var(--pri)}
.speed-val{font-weight:700;color:var(--pri);min-width:32px;text-align:center}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{
  padding:8px 14px;border-radius:20px;border:none;font-size:13px;
  font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;
  background:var(--card);color:var(--sub);border:1px solid var(--border);
}
.tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* Article header */
.art-header{text-align:center;margin-bottom:12px}
.art-title{font-size:20px;font-weight:700}
.art-meta{font-size:12px;color:var(--sub);margin-top:2px}
.tag{
  display:inline-block;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;background:var(--tag-bg);color:var(--sub);
}

/* Sentence Cards */
.sentences{display:flex;flex-direction:column;gap:6px}
.card{
  background:var(--card);border-radius:12px;padding:14px 16px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  display:flex;align-items:flex-start;gap:10px;cursor:pointer;
  transition:.15s;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.card:active{transform:scale(.98)}
.card.playing{
  border-color:var(--active2);background:var(--active);
}
.card .num{
  width:26px;height:26px;border-radius:50%;background:var(--tag-bg);
  font-size:11px;font-weight:700;color:var(--sub);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card.playing .num{background:var(--active2);color:#fff}
.card .txt{flex:1;font-size:16px;line-height:1.65}
.card .icon{font-size:16px;opacity:.4;flex-shrink:0}
.card.playing .icon{opacity:1}

/* Panels */
.panel{
  background:var(--card);border-radius:14px;padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);display:none;
}
.panel.show{display:block}
.panel h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.panel textarea{
  width:100%;min-height:140px;padding:12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text);
  font-size:15px;font-family:inherit;line-height:1.7;resize:vertical;
}
.panel textarea:focus{outline:none;border-color:var(--pri)}
.panel input[type=url]{
  width:100%;padding:12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text);
  font-size:14px;font-family:inherit;
}
.panel-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hint{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.5}

/* Status */
.status{
  margin-top:8px;padding:10px 14px;border-radius:8px;font-size:12px;
  display:none;align-items:center;gap:6px;
}
.status.show{display:flex}
.status.load{background:#fff3cd;color:#856404}
.status.ok{background:#d4edda;color:#155724}
.status.err{background:#f8d7da;color:#721c24}
[data-theme="dark"] .status.load{background:#3d3520;color:#ffc107}
[data-theme="dark"] .status.ok{background:#1e3a2f;color:#5ddb92}
[data-theme="dark"] .status.err{background:#3d1f22;color:#f5a0a0}
.spin{
  width:14px;height:14px;border:2px solid transparent;
  border-top-color:currentColor;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Drop zone */
.drop{
  border:2px dashed var(--border);border-radius:14px;padding:30px;
  text-align:center;background:var(--bg);cursor:pointer;
}
.drop em{font-size:36px;display:block;margin-bottom:8px}
.drop b{font-size:13px;display:block;margin-bottom:4px}
.drop span{font-size:11px;color:var(--sub)}
.preview-wrap{position:relative;display:none;margin-top:10px}
.preview-wrap.show{display:inline-block}
.preview-wrap img{max-width:100%;max-height:250px;border-radius:8px}
.preview-wrap .rm-btn{
  position:absolute;top:6px;right:6px;width:26px;height:26px;
  border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;
  cursor:pointer;font-size:14px;
}

/* Toast */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;
}
.toast.show{opacity:1}

/* Empty */
.empty{text-align:center;padding:30px;color:var(--sub);font-size:14px}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div>
      <h1><span>🎙️</span> 英语口语练习</h1>
      <div class="meta" id="progressLabel">点击下方句子开始跟读</div>
    </div>
    <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
  </div>

  <!-- Controls -->
  <div class="ctrl">
    <div class="ctrl-btns">
      <button class="btn btn-pri" id="btnPlay">▶ 播放</button>
      <button class="btn btn-out" id="btnPause" disabled>⏯ 暂停</button>
      <button class="btn btn-out" id="btnStop" disabled>⏹ 停止</button>
      <button class="btn btn-out btn-sm" id="btnRepeat">🔄</button>
    </div>
    <div class="ctrl-opts">
      语速 <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="0.75">
      <span class="speed-val" id="speedVal">0.75x</span>
      <span style="margin-left:4px">语音</span>
      <select id="voiceSelect"></select>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="articles">📚 内置文章</button>
    <button class="tab" data-tab="custom">✏️ 自定义文本</button>
    <button class="tab" data-tab="link">🔗 链接生成</button>
    <button class="tab" data-tab="ocr">📸 截图识别</button>
  </div>

  <!-- Article Select (articles tab only) -->
  <div id="articlesPanel" class="panel show">
    <select id="articleSelect" style="width:100%;max-width:100%"></select>
  </div>

  <!-- Custom Text Panel -->
  <div id="customPanel" class="panel">
    <h3>✏️ 粘贴英文文章</h3>
    <textarea id="customText" placeholder="在此粘贴任意英文文本..."></textarea>
    <div class="panel-actions">
      <button class="btn btn-pri btn-sm" id="btnApplyCustom">✅ 应用</button>
      <button class="btn btn-out btn-sm" id="btnClearCustom">清空</button>
    </div>
    <div class="hint">按句号、问号、感叹号自动拆分句子</div>
  </div>

  <!-- Link Panel -->
  <div id="linkPanel" class="panel">
    <h3>🔗 输入英文文章链接</h3>
    <input type="url" id="linkUrl" placeholder="https://...">
    <div class="panel-actions">
      <button class="btn btn-pri btn-sm" id="btnFetch">🚀 抓取生成</button>
      <button class="btn btn-out btn-sm" id="btnClearLink" style="display:none">清空</button>
    </div>
    <div class="status" id="linkStatus"><span class="spin"></span><span id="linkStatusText"></span></div>
    <div class="hint">支持 BBC、VOA、Wikipedia 等英文网页</div>
  </div>

  <!-- OCR Panel -->
  <div id="ocrPanel" class="panel">
    <h3>📸 截图识别英文</h3>
    <div class="drop" id="dropZone">
      <em>🖼️</em><b>点击 / 粘贴 / 拖拽 截图</b><span>Ctrl+V 粘贴剪贴板截图</span>
      <input type="file" accept="image/*" id="ocrFile" style="display:none">
    </div>
    <div class="preview-wrap" id="ocrPreviewWrap">
      <img id="ocrPreviewImg" src="">
      <button class="rm-btn" id="ocrPreviewRm">✕</button>
    </div>
    <div class="panel-actions">
      <button class="btn btn-pri btn-sm" id="btnOcrStart">🔍 开始识别</button>
      <button class="btn btn-out btn-sm" id="btnOcrClear" style="display:none">清除图片</button>
    </div>
    <div class="status" id="ocrStatus"><span class="spin"></span><span id="ocrStatusText"></span></div>
    <textarea id="ocrResult" style="display:none;margin-top:8px;min-height:80px" placeholder="识别结果..."></textarea>
    <div class="panel-actions" id="ocrApplyActions" style="display:none">
      <button class="btn btn-pri btn-sm" id="btnApplyOcr">✅ 应用文字开始练习</button>
    </div>
    <div class="hint">适用于英文视频字幕截图、书页拍照等</div>
  </div>

  <!-- Article Content -->
  <div class="art-header" id="artHeader">
    <div class="art-title" id="artTitle"></div>
    <div class="art-meta"><span class="tag" id="artTag"></span><span id="artInfo"></span></div>
  </div>
  <div class="sentences" id="sentences"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  // ===== DATA =====
  const articles = [
    {
      id:'daily',title:'My Daily Routine',diff:'初级',
      content:'I wake up at 6:30 every morning. The first thing I do is drink a glass of warm water. Then I go for a quick jog around the neighborhood for about 20 minutes. After that, I take a shower and get dressed for the day. I usually have a simple breakfast — some toast, eggs, and a cup of coffee. I leave home around 8:00 and take the bus to work. My workday starts at 9:00, and I spend most of the morning answering emails and attending meetings. At noon, I have lunch with my coworkers in the cafeteria. In the afternoon, I focus on my main tasks and projects. I finish work at 6:00 and head back home. In the evening, I like to relax by reading a book or watching a TV show. Sometimes I cook dinner, and sometimes I order takeout. Before going to bed, I plan out my tasks for the next day. I usually fall asleep around 10:30.'
    },
    {
      id:'solar',title:'The Solar System',diff:'中级',
      content:'The solar system is a fascinating place filled with planets, moons, and stars. At the center of our solar system is the Sun, a massive ball of burning gas that provides light and heat to everything around it. Orbiting the Sun are eight planets, each with its own unique characteristics. Mercury is the closest planet to the Sun and also the smallest. Venus is the brightest planet in our sky and is sometimes called the "morning star." Earth is the third planet from the Sun and the only one known to support life. Mars, often called the Red Planet, has the tallest volcano in the solar system. Jupiter is the largest planet — it is so big that over a thousand Earths could fit inside it! Saturn is famous for its beautiful rings made of ice and rock. Uranus and Neptune are the farthest planets, and they are known as the ice giants. Beyond Neptune lies the Kuiper Belt, home to dwarf planets like Pluto. Scientists continue to explore the solar system using powerful telescopes and space probes. There is still so much we have not yet discovered about our cosmic neighborhood.'
    },
    {
      id:'reading',title:'The Importance of Reading',diff:'中高级',
      content:'Reading is one of the most valuable habits a person can develop. It opens doors to new worlds, ideas, and perspectives that we might never encounter otherwise. When you read regularly, your vocabulary expands naturally without the need for memorization. Your writing skills also improve, because you absorb the rhythm and structure of good writing. Reading exercises your brain in ways that watching videos or scrolling through social media simply cannot match. Studies have shown that people who read frequently tend to have better focus and deeper concentration. Reading fiction, in particular, has been linked to increased empathy and emotional intelligence. It allows you to see the world through someone else\'s eyes and understand their thoughts and feelings. Nonfiction books, on the other hand, give you access to the knowledge and wisdom of experts in any field. In our fast-paced digital age, taking the time to sit quietly with a book is more important than ever. It gives your mind a break from constant notifications and distractions. Whether it is a novel, a biography, or a self-improvement guide, every book has something to offer. So pick up a book today — your future self will thank you.'
    }
  ];

  // ===== STATE =====
  const S = {
    sentences:[], curIdx:-1, playing:false, paused:false, rate:0.75,
    articleIdx:0, tab:'articles', theme:'light',
    ocrImg:null
  };

  // ===== DOM =====
  const $=s=>document.querySelector(s);
  const $$=s=>document.querySelectorAll(s);
  const D={
    sentences:$('#sentences'),artTitle:$('#artTitle'),artTag:$('#artTag'),artInfo:$('#artInfo'),
    progressLabel:$('#progressLabel'),
    btnPlay:$('#btnPlay'),btnPause:$('#btnPause'),btnStop:$('#btnStop'),btnRepeat:$('#btnRepeat'),
    speedSlider:$('#speedSlider'),speedVal:$('#speedVal'),voiceSelect:$('#voiceSelect'),
    articleSelect:$('#articleSelect'),
    themeBtn:$('#themeBtn'),toast:$('#toast'),
    // tabs
    articlesPanel:$('#articlesPanel'),customPanel:$('#customPanel'),
    linkPanel:$('#linkPanel'),ocrPanel:$('#ocrPanel'),
    customText:$('#customText'),linkUrl:$('#linkUrl'),linkStatus:$('#linkStatus'),linkStatusText:$('#linkStatusText'),
    ocrStatus:$('#ocrStatus'),ocrStatusText:$('#ocrStatusText'),
    ocrResult:$('#ocrResult'),ocrApplyActions:$('#ocrApplyActions'),
    dropZone:$('#dropZone'),ocrFile:$('#ocrFile'),
    ocrPreviewWrap:$('#ocrPreviewWrap'),ocrPreviewImg:$('#ocrPreviewImg'),
    artHeader:$('#artHeader'),
  };

  // ===== UTILS =====
  function splitSent(txt){
    const m=txt.match(/[^.!?]+[.!?]+[\s]*/g);
    return m?m.map(s=>s.trim()).filter(s=>s.length>0):[txt.trim()].filter(s=>s.length>0);
  }
  function toast(msg,d=2000){
    D.toast.textContent=msg;D.toast.classList.add('show');
    clearTimeout(D.toast._t);D.toast._t=setTimeout(()=>D.toast.classList.remove('show'),d);
  }
  function htm(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  function getText(){
    if(S.tab==='custom') return D.customText.value.trim();
    if(S.tab==='link') return D.linkUrl.dataset.content||'';
    if(S.tab==='ocr') return D.ocrResult.value.trim();
    return articles[S.articleIdx].content.trim();
  }
  function getTitle(){
    if(S.tab==='custom') return '✏️ 自定义文本';
    if(S.tab==='link') return D.linkUrl.dataset.title||'🔗 链接生成';
    if(S.tab==='ocr') return '📸 截图识别';
    return articles[S.articleIdx].title;
  }
  function getDiff(){
    if(S.tab==='articles') return articles[S.articleIdx].diff;
    return S.tab==='custom'?'自定义':S.tab==='link'?'链接':'OCR';
  }

  // ===== SPEECH =====
  let _speaking=false;
  let _utterance=null;

  function doSpeak(text){
    return new Promise(resolve=>{
      _utterance=new SpeechSynthesisUtterance(text);
      _utterance.rate=S.rate;
      _utterance.pitch=1;
      _utterance.volume=1;
      // iOS: set voice without calling getVoices() if possible, to avoid breaking gesture
      try{
        const voices=speechSynthesis.getVoices();
        const en=voices.filter(v=>v.lang.startsWith('en'));
        if(en.length>0){
          const idx=parseInt(D.voiceSelect.value);
          if(!isNaN(idx)&&en[idx]) _utterance.voice=en[idx];
        }
      }catch(e){}
      _utterance.onstart=()=>{_speaking=true};
      _utterance.onend=()=>{_speaking=false;_utterance=null;resolve()};
      _utterance.onerror=()=>{_speaking=false;_utterance=null;resolve()};
      // iOS fail-safe timeout
      const timeout=Math.max(8000,text.length*100);
      setTimeout(()=>{if(_utterance){_utterance=null;resolve()}},timeout);
      speechSynthesis.speak(_utterance);
    });
  }

  function stopSpeech(){
    if(_speaking||_utterance){
      try{speechSynthesis.cancel()}catch(e){}
      _utterance=null;_speaking=false;
    }
  }

  async function speakOne(idx,autoNext){
    const txt=S.sentences[idx];if(!txt)return;
    if(autoNext) stopSpeech();
    await doSpeak(txt);
    if(!S.playing&&!autoNext)return;
    if(S.paused)return;
    if(autoNext&&S.playing&&!S.paused){
      const nxt=idx+1;
      if(nxt<S.sentences.length){
        S.curIdx=nxt;highlight(nxt);updateUI();
        await speakOne(nxt,true);
      }else{stop();toast('✅ 播放完毕');}
    }
  }

  function stop(){
    stopSpeech();
    S.playing=false;S.paused=false;S.curIdx=-1;
    updateCtrls();clearHL();updateUI();
  }
  function pause(){
    stopSpeech();
    S.paused=true;S.playing=false;updateCtrls();
  }

  // ===== UI =====
  function clearHL(){$$('.card').forEach(c=>c.classList.remove('playing'))}
  function highlight(idx){
    clearHL();
    const cards=$$('.card');if(cards[idx])cards[idx].classList.add('playing');
  }
  function updateUI(){
    const t=S.sentences.length;
    if(S.curIdx>=0&&S.curIdx<t)D.progressLabel.textContent=`${S.curIdx+1} / ${t} 句`;
    else D.progressLabel.textContent=`共 ${t} 句`;
  }
  function updateCtrls(){
    if(S.playing||S.paused){
      D.btnPlay.disabled=true;D.btnPause.disabled=false;D.btnStop.disabled=false;
      D.btnPause.textContent=S.paused?'▶ 继续':'⏯ 暂停';
    }else{
      D.btnPlay.disabled=false;D.btnPause.disabled=true;D.btnStop.disabled=true;
      D.btnPause.textContent='⏯ 暂停';
    }
  }

  // ===== RENDER =====
  function renderSentences(){
    const article=getText();
    S.sentences=splitSent(article);
    S.curIdx=-1;stop();
    D.artTitle.textContent=getTitle();D.artTag.textContent=getDiff();
    const wc=article?article.split(/\s+/).length:0;
    D.artInfo.textContent=wc?` · ${wc} 单词`:'';
    updateUI();
    if(S.sentences.length===0){
      D.sentences.innerHTML='<div class="empty">暂无内容，请选择文章或输入文本</div>';
      return;
    }
    D.sentences.innerHTML=S.sentences.map((s,i)=>`
      <div class="card" data-i="${i}">
        <span class="num">${i+1}</span>
        <span class="txt">${htm(s)}</span>
        <span class="icon">🔊</span>
      </div>
    `).join('');
    $$('.card').forEach(c=>c.addEventListener('click',()=>{
      const i=parseInt(c.dataset.i);playSingle(i);
    }));
  }

  async function playSingle(idx){
    S.playing=false;S.paused=false;S.curIdx=idx;
    highlight(idx);updateUI();updateCtrls();
    await speakOne(idx,false);
    if(!S.playing){S.curIdx=-1;clearHL();updateUI();}
  }

  // ===== TABS =====
  function switchTab(tab){
    S.tab=tab;stop();
    $$('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    D.articlesPanel.classList.toggle('show',tab==='articles');
    D.customPanel.classList.toggle('show',tab==='custom');
    D.linkPanel.classList.toggle('show',tab==='link');
    D.ocrPanel.classList.toggle('show',tab==='ocr');
    if(tab==='articles'){
      D.articleSelect.value=S.articleIdx;
    }
    renderSentences();
  }

  // ===== VOICES =====
  function loadVoices(){
    const voices=window.speechSynthesis.getVoices();
    const en=voices.filter(v=>v.lang.startsWith('en'));
    D.voiceSelect.innerHTML=en.length===0
      ?'<option value="">默认</option>'
      :en.map((v,i)=>`<option value="${i}">${v.name.split(' ')[0]} (${v.lang})</option>`).join('');
    if(en.length>0){
      const p=en.findIndex(v=>v.name.includes('Google')&&v.lang==='en-US');
      D.voiceSelect.selectedIndex=p>=0?p:0;
    }
  }

  // ===== LINK =====
  async function fetchLink(){
    let url=D.linkUrl.value.trim();
    if(!url){toast('⚠️ 请输入链接');return;}
    if(!/^https?:\/\//i.test(url)){url='https://'+url;D.linkUrl.value=url;}
    D.linkStatus.className='status show load';D.linkStatusText.textContent='正在抓取...';
    D.linkStatus.querySelector('.spin').style.display='';
    try{
      const r=await fetch('https://r.jina.ai/'+url,{headers:{Accept:'text/plain'}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      let text=await r.text();
      let title='';
      const tm=text.match(/^Title:\s*(.+)$/m);
      if(tm){title=tm[1].trim();text=text.replace(/^Title:\s*.+$/m,'').replace(/^\s*\n+/,'').trim();}
      text=text.replace(/^#{1,6}\s+/gm,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1');
      text=text.replace(/`(.+?)`/g,'$1').replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[(.+?)\]\(.*?\)/g,'$1');
      text=text.replace(/\n{3,}/g,'\n\n').trim();
      if(!text||text.length<20)throw new Error('内容太短');
      D.linkUrl.dataset.content=text;D.linkUrl.dataset.title=title;
      localStorage.setItem('ep-link-url',url);localStorage.setItem('ep-link-text',text);
      localStorage.setItem('ep-link-title',title);
      D.linkStatus.className='status show ok';D.linkStatusText.textContent='✅ 抓取成功！';
      document.querySelector('#linkPanel .btn-out').style.display='';
      renderSentences();toast('✅ 文章已生成');
    }catch(e){
      D.linkStatus.className='status show err';D.linkStatusText.textContent='❌ '+e.message;
    }
  }

  // ===== OCR =====
  let tesseractReady=false;
  function loadOcrImg(file){
    S.ocrImg=file;
    const r=new FileReader();r.onload=e=>{
      D.ocrPreviewImg.src=e.target.result;D.ocrPreviewWrap.classList.add('show');
      document.querySelector('#ocrPanel .btn-out').style.display='';
      D.ocrResult.style.display='none';D.ocrApplyActions.style.display='none';
    };r.readAsDataURL(file);
  }
  function clearOcrImg(){
    S.ocrImg=null;D.ocrPreviewWrap.classList.remove('show');D.ocrFile.value='';
    document.querySelector('#ocrPanel .btn-out').style.display='none';
    D.ocrResult.style.display='none';D.ocrApplyActions.style.display='none';
  }
  async function doOcr(){
    if(!S.ocrImg){toast('⚠️ 请先导入截图');return;}
    if(!tesseractReady){
      D.ocrStatus.className='status show load';D.ocrStatusText.textContent='加载识别引擎(约4MB)...';
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload=resolve;s.onerror=()=>reject(new Error('引擎加载失败'));
        document.head.appendChild(s);
      });
      tesseractReady=true;
    }
    D.ocrStatus.className='status show load';D.ocrStatusText.textContent='正在识别...';
    try{
      const r=await Tesseract.recognize(S.ocrImg,'eng',{
        logger:i=>{if(i.status==='recognizing text')D.ocrStatusText.textContent=`识别中: ${Math.round(i.progress*100)}%`;}
      });
      const text=r.data.text.trim();
      if(!text||text.length<3){D.ocrStatus.className='status show err';D.ocrStatusText.textContent='❌ 未识别到英文';return;}
      D.ocrResult.value=text;D.ocrResult.style.display='block';D.ocrApplyActions.style.display='flex';
      D.ocrStatus.className='status show ok';D.ocrStatusText.textContent='✅ 识别完成';
    }catch(e){
      D.ocrStatus.className='status show err';D.ocrStatusText.textContent='❌ '+e.message;
    }
  }

  // ===== EVENTS =====
  D.btnPlay.addEventListener('click',()=>{
    if(S.sentences.length===0){toast('⚠️ 没有可播放的内容');return;}
    S.playing=true;S.paused=false;S.curIdx=0;
    highlight(0);updateUI();updateCtrls();speakOne(0,true);
  });
  D.btnPause.addEventListener('click',()=>{
    if(S.paused){S.paused=false;S.playing=true;updateCtrls();speakOne(S.curIdx,true);}
    else if(S.playing){pause();}
  });
  D.btnStop.addEventListener('click',()=>{stop();toast('⏹ 已停止')});
  D.btnRepeat.addEventListener('click',()=>{
    if(S.curIdx>=0&&S.curIdx<S.sentences.length){
      highlight(S.curIdx);speakOne(S.curIdx,S.playing&&!S.paused);
    }else toast('请先点击一个句子');
  });
  D.speedSlider.addEventListener('input',()=>{S.rate=+D.speedSlider.value;D.speedVal.textContent=S.rate.toFixed(1)+'x'});
  D.voiceSelect.addEventListener('change',()=>{});
  D.themeBtn.addEventListener('click',()=>{
    S.theme=S.theme==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',S.theme);
    D.themeBtn.textContent=S.theme==='dark'?'☀️':'🌙';
    localStorage.setItem('ep-theme',S.theme);
  });

  // Tabs
  $$('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
  D.articleSelect.addEventListener('change',()=>{S.articleIdx=+D.articleSelect.value;renderSentences()});

  // Custom text
  D.customText.addEventListener('input',()=>{
    localStorage.setItem('ep-custom',D.customText.value);
  });
  D.btnApplyCustom.addEventListener('click',()=>{renderSentences();toast('✅ 已应用')});
  D.btnClearCustom.addEventListener('click',()=>{D.customText.value='';localStorage.removeItem('ep-custom');renderSentences()});

  // Link
  D.btnFetch.addEventListener('click',fetchLink);
  D.linkUrl.addEventListener('keydown',e=>{if(e.key==='Enter')fetchLink()});
  document.querySelector('#linkPanel .btn-out').addEventListener('click',()=>{
    D.linkUrl.value='';delete D.linkUrl.dataset.content;delete D.linkUrl.dataset.title;
    localStorage.removeItem('ep-link-url');localStorage.removeItem('ep-link-text');localStorage.removeItem('ep-link-title');
    document.querySelector('#linkPanel .btn-out').style.display='none';
    D.linkStatus.className='status';renderSentences();toast('已清除');
  });

  // OCR
  D.dropZone.addEventListener('click',()=>D.ocrFile.click());
  D.ocrFile.addEventListener('change',e=>{if(e.target.files[0])loadOcrImg(e.target.files[0])});
  D.ocrPreviewRm.addEventListener('click',e=>{e.stopPropagation();clearOcrImg()});
  D.dropZone.addEventListener('dragover',e=>{e.preventDefault();D.dropZone.style.borderColor='var(--pri)'});
  D.dropZone.addEventListener('dragleave',()=>{D.dropZone.style.borderColor=''});
  D.dropZone.addEventListener('drop',e=>{e.preventDefault();D.dropZone.style.borderColor='';if(e.dataTransfer.files[0])loadOcrImg(e.dataTransfer.files[0])});
  document.addEventListener('paste',e=>{
    if(S.tab!=='ocr')return;
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    for(const it of e.clipboardData.items){if(it.type.startsWith('image/')){e.preventDefault();loadOcrImg(it.getAsFile());toast('📸 已粘贴');break;}}
  });
  D.btnOcrStart.addEventListener('click',doOcr);
  D.btnApplyOcr.addEventListener('click',()=>{renderSentences();toast('✅ 已应用')});
  document.querySelector('#ocrPanel .btn-out:nth-of-type(1)').addEventListener('click',clearOcrImg);

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if(e.key===' '){e.preventDefault();S.playing||S.paused?D.btnPause.click():D.btnPlay.click()}
    else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();if(S.curIdx<S.sentences.length-1)playSingle(S.curIdx+1)}
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();if(S.curIdx>0)playSingle(S.curIdx-1)}
    else if(e.key==='Escape'){e.preventDefault();stop()}
    else if(e.key==='r'&&!e.ctrlKey){e.preventDefault();D.btnRepeat.click()}
  });

  // ===== INIT =====
  function init(){
    // Theme
    if(localStorage.getItem('ep-theme')==='dark'){S.theme='dark';document.documentElement.setAttribute('data-theme','dark');D.themeBtn.textContent='☀️'}
    // Article select
    D.articleSelect.innerHTML=articles.map((a,i)=>{
      const d={'初级':'🟢','中级':'🟡','中高级':'🟠'};
      return `<option value="${i}">${d[a.diff]||''} ${a.title}</option>`;
    }).join('');
    // Voices
    loadVoices();if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=loadVoices;
    // Restore custom text
    const ct=localStorage.getItem('ep-custom');if(ct)D.customText.value=ct;
    // Restore link
    const lu=localStorage.getItem('ep-link-url');const lt=localStorage.getItem('ep-link-text');
    if(lu)D.linkUrl.value=lu;if(lt){D.linkUrl.dataset.content=lt;D.linkUrl.dataset.title=localStorage.getItem('ep-link-title')||'';document.querySelector('#linkPanel .btn-out').style.display=''}
    // Render
    renderSentences();
  }
  init();
})();
</script>
</body>
</html>
